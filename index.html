<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FluxBlue - Sistema Financeiro</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js";

        window.FirebaseSDK = {
            initializeApp,
            auth: { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup },
            firestore: { getFirestore, doc, onSnapshot, setDoc, getDoc }
        };
        window.dispatchEvent(new Event('firebase-ready'));
    </script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { brand: { 50: '#eff6ff', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' }, whatsapp: { 500: '#25D366' } } } }
        }
    </script>
    <style>
        body { background-color: #f8fafc; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"><div class="h-screen flex items-center justify-center"><div class="loader"></div></div></div>

    <script type="text/babel">
        const Icons = {
            Logo: ({ className = "w-10 h-10" }) => (
                <svg viewBox="0 0 100 100" className={className} fill="none"><rect width="100" height="100" rx="24" className="fill-brand-600"/><path d="M25 65L40 45L55 60L75 30" stroke="white" strokeWidth="8" strokeLinecap="round" strokeLinejoin="round"/></svg>
            ),
            Dashboard: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>,
            Transactions: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4" /><path d="M3 5v14a2 2 0 0 0 2 2h16v-5" /><path d="M18 12a2 2 0 0 0 0 4h4v-4Z" /></svg>,
            Debts: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M16 2v4"/><path d="M8 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>,
            Goals: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
            Profile: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
            Trash: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
            Google: () => <svg viewBox="0 0 24 24" width="20" height="20"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/></svg>,
            Lock: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        };

        const DEFAULT_DATA = {
            transactions: [], goals: [], debts: [], customCategories: ['Casa', 'Mercado', 'Lazer', 'Saúde', 'Transporte', 'Salário'],
            settings: { userName: 'Usuário' },
            subscription: { active: true, expiresAt: new Date(Date.now() + 7*24*60*60*1000).toISOString() }
        };

        function startApp() {
            const { initializeApp } = window.FirebaseSDK;
            const { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } = window.FirebaseSDK.auth;
            const { getFirestore, doc, onSnapshot, setDoc, getDoc } = window.FirebaseSDK.firestore;

            // MESMA CONFIGURAÇÃO DE BANCO EM AMBOS OS ARQUIVOS
            const firebaseConfig = {
                apiKey: "AIzaSyB5I6RG-FicgOThwhl-1LLWySo3JRjK1YI",
                authDomain: "bompre-8a7c0.firebaseapp.com",
                projectId: "bompre-8a7c0",
                storageBucket: "bompre-8a7c0.firebasestorage.app",
                messagingSenderId: "390830730249",
                appId: "1:390830730249:web:106a313c6d2bae02ec5cd8"
            };

            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = 'fluxblue-prod-v6';

            const { useState, useEffect, useMemo } = React;
            const { BarChart, Bar, XAxis, Tooltip, ResponsiveContainer } = window.Recharts || {};

            const AuthScreen = () => {
                const [email, setEmail] = useState(''); const [password, setPassword] = useState('');
                const [error, setError] = useState(''); const [loading, setLoading] = useState(false);

                const createInitialUserData = async (uid, userEmail) => {
                    const docRef = doc(db, 'artifacts', appId, 'public_users', uid);
                    const docSnap = await getDoc(docRef);
                    if (!docSnap.exists()) {
                        const exp = new Date(); exp.setDate(exp.getDate() + 7);
                        await setDoc(docRef, { email: userEmail, active: true, archived: false, expiresAt: exp.toISOString() });
                        await setDoc(doc(db, 'artifacts', appId, 'users', uid, 'data', 'finance'), { ...DEFAULT_DATA, subscription: { active: true, expiresAt: exp.toISOString() } });
                    }
                };

                const handleSubmit = async (e) => {
                    e.preventDefault(); setError(''); setLoading(true);
                    try { 
                        try { await signInWithEmailAndPassword(auth, email, password); } 
                        catch (e) { 
                             if(e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential'){
                                 const uc = await createUserWithEmailAndPassword(auth, email, password);
                                 await createInitialUserData(uc.user.uid, uc.user.email);
                             } else throw e;
                        }
                    } catch (err) { setError("Erro ao entrar. Verifique os dados."); } finally { setLoading(false); }
                };

                const handleGoogleLogin = async () => {
                    setLoading(true);
                    try {
                        const res = await signInWithPopup(auth, new GoogleAuthProvider());
                        await createInitialUserData(res.user.uid, res.user.email);
                    } catch (err) { setError("Erro com Google: " + err.message); } finally { setLoading(false); }
                };

                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-100 p-4">
                        <div className="max-w-md w-full bg-white rounded-xl shadow-lg p-8">
                            <div className="text-center mb-6">
                                <div className="flex justify-center mb-2"><Icons.Logo className="w-16 h-16" /></div>
                                <h1 className="text-3xl font-bold">Flux<span className="text-brand-600">Blue</span></h1>
                                <p className="text-slate-500 text-sm">Acesso ao Sistema</p>
                            </div>
                            {error && <div className="mb-4 p-3 bg-red-50 text-red-600 text-sm rounded">{error}</div>}
                            <form onSubmit={handleSubmit} className="space-y-4">
                                <input required type="email" className="w-full border rounded-lg p-3 text-sm" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} />
                                <input required type="password" className="w-full border rounded-lg p-3 text-sm" placeholder="Senha" value={password} onChange={e=>setPassword(e.target.value)} />
                                <button disabled={loading} className="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3 rounded-lg shadow">Entrar com Email</button>
                            </form>
                            <button onClick={handleGoogleLogin} disabled={loading} className="w-full mt-4 border hover:bg-slate-50 text-slate-700 font-bold py-3 rounded-lg flex items-center justify-center gap-3">
                                <Icons.Google /> Continuar com Google
                            </button>
                        </div>
                    </div>
                );
            };

            const Paywall = ({ user }) => (
                <div className="min-h-screen flex items-center justify-center bg-slate-900 p-4 text-center">
                    <div className="max-w-md w-full bg-white rounded-2xl shadow-2xl p-8">
                        <div className="mx-auto bg-red-100 w-16 h-16 rounded-full flex items-center justify-center mb-6"><Icons.Lock className="text-red-600 w-8 h-8" /></div>
                        <h2 className="text-2xl font-bold text-slate-800 mb-2">Assinatura Expirada</h2>
                        <p className="text-slate-600 mb-6 text-sm">Renove seu plano para continuar usando o FluxBlue.</p>
                        <a href="https://pay.cakto.com.br/scbctc9_679715" target="_blank" className="block w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg mb-3">Renovar Agora</a>
                        <button onClick={()=>window.location.reload()} className="text-brand-600 text-xs font-bold hover:
