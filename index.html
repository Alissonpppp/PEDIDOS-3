<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FluxBlue - Gestão Financeira Completa</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js";

        window.FirebaseSDK = {
            initializeApp,
            auth: { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup },
            firestore: { getFirestore, doc, onSnapshot, setDoc, getDoc }
        };
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: { 
                        brand: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 900: '#312e81' },
                        slate: { 850: '#1a2234', 900: '#0f172a' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8fafc; color: #0f172a; -webkit-tap-highlight-color: transparent; }
        .card-shadow { box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05); }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="antialiased selection:bg-brand-500 selection:text-white">
    <div id="root"><div class="h-screen flex items-center justify-center"><div class="loader"></div></div></div>

    <script type="text/babel">
        const Icons = {
            Logo: ({ className = "w-8 h-8" }) => (
                <svg viewBox="0 0 100 100" className={className} fill="none"><rect width="100" height="100" rx="28" className="fill-brand-600"/><path d="M30 65L45 45L60 60L75 30" stroke="white" strokeWidth="8" strokeLinecap="round" strokeLinejoin="round"/><circle cx="75" cy="30" r="5" fill="white" /></svg>
            ),
            Dashboard: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><rect width="7" height="9" x="3" y="3" rx="2"/><rect width="7" height="5" x="14" y="3" rx="2"/><rect width="7" height="9" x="14" y="12" rx="2"/><rect width="7" height="5" x="3" y="16" rx="2"/></svg>,
            Transactions: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M7 15h0M17 9h0M12 12h0M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>,
            Debts: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="m15 9-6 6"/><path d="M9 9h.01"/><path d="M15 15h.01"/><rect width="20" height="14" x="2" y="5" rx="2"/></svg>,
            Budgets: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>,
            Goals: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>,
            Profile: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 0 0-16 0"/></svg>,
            Trash: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>,
            Google: () => <svg viewBox="0 0 24 24" width="20" height="20"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/></svg>,
            Lock: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
            Plus: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M5 12h14M12 5v14"/></svg>,
            Flame: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>,
            TrendingUp: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
        };

        const DEFAULT_DATA = {
            transactions: [], goals: [], debts: [], 
            budgets: [
                { category: 'Casa', limit: 1500 }, { category: 'Mercado', limit: 800 },
                { category: 'Lazer', limit: 400 }, { category: 'Transporte', limit: 300 }
            ],
            incomeForecasts: [
                { id: 1, source: 'Salário Principal', expectedAmount: 3000 }
            ],
            customCategories: ['Casa', 'Mercado', 'Lazer', 'Saúde', 'Transporte', 'Salário', 'Investimento', 'Dívidas'],
            settings: { userName: 'Usuário' },
            subscription: { active: true, expiresAt: new Date(Date.now() + 7*24*60*60*1000).toISOString() }
        };

        function startApp() {
            const { initializeApp } = window.FirebaseSDK;
            const { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } = window.FirebaseSDK.auth;
            const { getFirestore, doc, onSnapshot, setDoc, getDoc } = window.FirebaseSDK.firestore;

            const firebaseConfig = {
                apiKey: "AIzaSyB5I6RG-FicgOThwhl-1LLWySo3JRjK1YI",
                authDomain: "bompre-8a7c0.firebaseapp.com",
                projectId: "bompre-8a7c0",
                storageBucket: "bompre-8a7c0.firebasestorage.app",
                messagingSenderId: "390830730249",
                appId: "1:390830730249:web:106a313c6d2bae02ec5cd8"
            };

            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = 'fluxblue-prod-v6';

            const { useState, useEffect, useMemo } = React;
            const { AreaChart, Area, BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, Legend } = window.Recharts || {};

            const AuthScreen = () => {
                const [email, setEmail] = useState(''); const [password, setPassword] = useState('');
                const [error, setError] = useState(''); const [loading, setLoading] = useState(false);

                const createInitialUserData = async (uid, userEmail) => {
                    const docRef = doc(db, 'artifacts', appId, 'public_users', uid);
                    const docSnap = await getDoc(docRef);
                    if (!docSnap.exists()) {
                        const exp = new Date(); exp.setDate(exp.getDate() + 7);
                        await setDoc(docRef, { email: userEmail, active: true, archived: false, expiresAt: exp.toISOString() });
                        await setDoc(doc(db, 'artifacts', appId, 'users', uid, 'data', 'finance'), { ...DEFAULT_DATA, subscription: { active: true, expiresAt: exp.toISOString() } });
                    }
                };

                const handleSubmit = async (e) => {
                    e.preventDefault(); setError(''); setLoading(true);
                    try { 
                        try { await signInWithEmailAndPassword(auth, email, password); } 
                        catch (e) { 
                             if(e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential'){
                                 const uc = await createUserWithEmailAndPassword(auth, email, password);
                                 await createInitialUserData(uc.user.uid, uc.user.email);
                             } else throw e;
                        }
                    } catch (err) { setError("Credenciais inválidas ou erro de conexão."); } finally { setLoading(false); }
                };

                const handleGoogleLogin = async () => {
                    setLoading(true);
                    try {
                        const res = await signInWithPopup(auth, new GoogleAuthProvider());
                        await createInitialUserData(res.user.uid, res.user.email);
                    } catch (err) { setError("Erro com Google: " + err.message); } finally { setLoading(false); }
                };

                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-50 p-4">
                        <div className="max-w-md w-full bg-white rounded-3xl card-shadow p-8 border border-slate-100">
                            <div className="text-center mb-8">
                                <div className="inline-flex p-3 bg-brand-50 rounded-2xl mb-3 text-brand-600"><Icons.Logo className="w-10 h-10" /></div>
                                <h1 className="text-2xl font-extrabold tracking-tight text-slate-900">Flux<span className="text-brand-600">Blue</span></h1>
                                <p className="text-slate-500 text-sm mt-1">Sua vida financeira no controle</p>
                            </div>
                            {error && <div className="mb-4 p-3 bg-rose-50 text-rose-600 text-xs font-semibold rounded-xl border border-rose-100">{error}</div>}
                            <form onSubmit={handleSubmit} className="space-y-3">
                                <input required type="email" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3.5 text-sm focus:outline-none focus:border-brand-600 focus:bg-white transition" placeholder="Seu e-mail" value={email} onChange={e=>setEmail(e.target.value)} />
                                <input required type="password" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3.5 text-sm focus:outline-none focus:border-brand-600 focus:bg-white transition" placeholder="Sua senha" value={password} onChange={e=>setPassword(e.target.value)} />
                                <button disabled={loading} className="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-brand-500/25 transition active:scale-[0.98]">Acessar Conta</button>
                            </form>
                            <div className="relative my-6"><div className="absolute inset-0 flex items-center"><div className="w-full border-t border-slate-100"></div></div><div className="relative flex justify-center text-xs uppercase"><span className="bg-white px-3 text-slate-400 font-bold tracking-wider">Ou continue com</span></div></div>
                            <button onClick={handleGoogleLogin} disabled={loading} className="w-full bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 font-bold py-3.5 rounded-xl flex items-center justify-center gap-3 transition active:scale-[0.98]">
                                <Icons.Google /> Google
                            </button>
                        </div>
                    </div>
                );
            };

            const Paywall = ({ user }) => (
                <div className="min-h-screen flex items-center justify-center bg-slate-900 p-4 text-center">
                    <div className="max-w-md w-full bg-white rounded-3xl shadow-2xl p-8">
                        <div className="mx-auto bg-rose-100 text-rose-600 w-16 h-16 rounded-2xl flex items-center justify-center mb-6"><Icons.Lock /></div>
                        <h2 className="text-2xl font-extrabold text-slate-900 mb-2">Período de teste encerrado</h2>
                        <p className="text-slate-500 mb-6 text-sm">Renove sua assinatura para manter o controle total das suas finanças e continuar saindo das dívidas.</p>
                        <a href="https://pay.cakto.com.br/scbctc9_679715" target="_blank" className="block w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-brand-500/25 transition mb-3">Renovar Assinatura Agora</a>
                        <button onClick={()=>window.location.reload()} className="text-brand-600 text-xs font-bold hover:underline mb-6 block w-full">Já realizei o pagamento</button>
                        <div className="border-t border-slate-100 pt-4">
                            <button onClick={() => signOut(auth)} className="text-xs text-slate-400 font-medium">Sair da conta ({user.email})</button>
                        </div>
                    </div>
                </div>
            );

            // COMPONENTE DO CHAT BLINDADO E COM MODO CONVERSA ATIVO
            const AIChatAssistant = ({ localData, saveToCloud, balance, monthlyExp, monthlyInc, totalDebtsRemaining }) => {
                const [isOpen, setIsOpen] = useState(false);
                const [messages, setMessages] = useState([
                    { id: 1, sender: 'bot', text: 'Olá! Sou o Flux AI 🤖. Pode conversar comigo sobre suas finanças, pedir conselhos OU mandar um gasto/foto de comprovante que eu anoto no painel!' }
                ]);
                const [input, setInput] = useState('');
                const [loading, setLoading] = useState(false);
                const [selectedImage, setSelectedImage] = useState(null);

                const handleImageSelect = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onloadend = () => setSelectedImage(reader.result);
                        reader.readAsDataURL(file);
                    }
                };

                const handleSend = async (e) => {
                    e.preventDefault();
                    if (!input && !selectedImage) return;

                    const userMsg = { 
                        id: Date.now(), 
                        sender: 'user', 
                        text: input || '📷 [Comprovante anexado]', 
                        image: selectedImage 
                    };
                    
                    setMessages(prev => [...prev, userMsg]);
                    setInput('');
                    const imgToSend = selectedImage;
                    setSelectedImage(null);
                    setLoading(true);

                    try {
                        const _segredo = [
                            'QVEuQWI4Uk42TERSVXJQ', 
                            'S3QxOUFJMUo4RGt1R3J1', 
                            'N05hYXB5UWpwV3BXdnhVdWVNejd3MkE='
                        ];
                        const API_KEY = atob(_segredo.join(''));
                        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

                        // Formatação segura com fallback (0) para evitar que o código quebre se o saldo estiver carregando
                        const sSaldo = (balance || 0).toFixed(2);
                        const sGastoMes = (monthlyExp || 0).toFixed(2);
                        const sRecMes = (monthlyInc || 0).toFixed(2);
                        const sDiv = (totalDebtsRemaining || 0).toFixed(2);
                        
                        const historicoRecente = (localData.transactions || []).slice(0, 5)
                            .map(t => `${t.desc}: R$ ${t.amount.toFixed(2)} (${t.type === 'income' ? 'Receita' : 'Despesa'})`).join(' | ');

                        const promptSistema = `Você é o Flux AI, um consultor financeiro inteligente, animado e prestativo integrado ao aplicativo FluxBlue.

DADOS EM TEMPO REAL DA CONTA DO USUÁRIO AGORA:
- Saldo Atual em Conta: R$ ${sSaldo}
- Total Gasto no Mês Atual: R$ ${sGastoMes}
- Total Recebido no Mês Atual: R$ ${sRecMes}
- Dívidas Restantes a Quitar: R$ ${sDiv}
- Últimos lançamentos: ${historicoRecente || 'Nenhum lançamento recente'}

COMO SE COMPORTAR:
1. SE O USUÁRIO ESTIVER APENAS CONVERSANDO ("como que ta minha situação", "pode me dar uma dica?", "oi", "dá pra sair hoje?"): Analise os números reais acima e responda no campo "botReply" como um excelente conselheiro financeiro, com tom amigável e encorajador. Mantenha "isTransaction" como false e "amount" como 0.
2. SE O USUÁRIO DIGITAR UM GASTO/RECEITA ("Mercado 45", "Salário 2000") OU ENVIAR FOTO DE CUPOM: Extraia os valores, defina "isTransaction" como true, preencha os dados e confirme alegremente no "botReply".

FORMATO OBRIGATÓRIO DE RESPOSTA:
Você DEVE responder UNICAMENTE um objeto JSON estrito sem crases de formatação Markdown ou texto em volta:
{
  "isTransaction": true ou false,
  "desc": "Nome curto do gasto (deixe vazio se for apenas conversa)",
  "amount": 00.00,
  "type": "expense" ou "income",
  "category": "Casa", "Mercado", "Lazer", "Saúde", "Transporte", "Salário", "Dívidas" ou "Outros",
  "botReply": "Sua resposta conversacional analisando a situação financeira OU confirmando o registro."
}`;

                        const partes = [{ text: `${promptSistema}\n\nMensagem do usuário: ${userMsg.text}` }];

                        if (imgToSend) {
                            const base64Data = imgToSend.split(',')[1];
                            const mimeType = imgToSend.split(';')[0].split(':')[1];
                            partes.push({
                                inline_data: {
                                    mime_type: mimeType,
                                    data: base64Data
                                }
                            });
                        }

                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: partes }],
                                generationConfig: { response_mime_type: "application/json" }
                            })
                        });

                        const data = await response.json();
                        
                        // Diagnóstico preciso caso a chave de API ou o Google Cloud devolva um erro real
                        if (!response.ok) {
                            const erroGoogle = data.error?.message || 'Erro de autorização no Google';
                            console.error("Erro do Google Cloud:", data.error);
                            throw new Error(`Google API: ${erroGoogle}`);
                        }

                        const textoResposta = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
                        
                        // Extrator seguro usando Regex: localiza o bloco JSON { ... } mesmo se a IA mandar texto extra em volta
                        const matchJson = textoResposta.match(/\{[\s\S]*\}/);
                        if (!matchJson) {
                            throw new Error("Formato de resposta incompatível.");
                        }
                        
                        const iaResult = JSON.parse(matchJson[0]);

                        // Se for transação real, salva no Firebase e atualiza os gráficos do painel
                        if (iaResult.isTransaction && iaResult.amount && Number(iaResult.amount) > 0) {
                            const newTx = {
                                id: Date.now(),
                                desc: iaResult.desc || 'Gasto IA',
                                amount: Number(iaResult.amount),
                                type: iaResult.type === 'income' ? 'income' : 'expense',
                                category: iaResult.category || 'Outros',
                                date: new Date().toISOString()
                            };
                            await saveToCloud({
                                ...localData,
                                transactions: [newTx, ...(localData.transactions || [])]
                            });
                        }

                        setMessages(prev => [...prev, { id: Date.now()+1, sender: 'bot', text: iaResult.botReply || 'Compreendido! Como posso te ajudar agora?' }]);

                    } catch (error) {
                        console.error("Erro detalhado do Flux AI:", error);
                        let msgErro = 'Opa, tive uma instabilidade momentânea na conexão. Pode repetir?';
                        if (error.message.includes('Google API')) {
                            msgErro = `⚠️ Aviso do Sistema: ${error.message} (Verifique se há restrições de domínio ou cota excedida na sua chave API do Google).`;
                        }
                        setMessages(prev => [...prev, { id: Date.now()+1, sender: 'bot', text: msgErro }]);
                    } finally {
                        setLoading(false);
                    }
                };

                return (
                    <div className="fixed bottom-6 right-6 z-50">
                        {!isOpen ? (
                            <button onClick={() => setIsOpen(true)} className="bg-brand-600 hover:bg-brand-500 text-white p-4 rounded-full shadow-2xl flex items-center gap-2 font-bold text-sm transition transform hover:scale-105 active:scale-95">
                                <span className="text-xl">🤖</span>
                                <span className="hidden sm:inline font-extrabold">Flux AI</span>
                            </button>
                        ) : (
                            <div className="bg-white w-80 sm:w-96 h-[480px] rounded-3xl card-shadow border border-slate-200 flex flex-col overflow-hidden animate-fade-in shadow-2xl">
                                <div className="bg-slate-900 text-white p-4 flex justify-between items-center">
                                    <div className="flex items-center gap-2">
                                        <span className="text-xl">🤖</span>
                                        <div><h4 className="font-bold text-sm">Flux AI</h4><span className="text-[10px] text-emerald-400 font-semibold block">● Consultor & Assistente</span></div>
                                    </div>
                                    <button onClick={() => setIsOpen(false)} className="text-slate-400 hover:text-white font-bold px-2 text-lg">✕</button>
                                </div>

                                <div className="flex-1 p-4 overflow-y-auto space-y-3 bg-slate-50 text-xs font-medium">
                                    {messages.map(m => (
                                        <div key={m.id} className={`flex flex-col ${m.sender === 'user' ? 'items-end' : 'items-start'}`}>
                                            <div className={`max-w-[85%] p-3 rounded-2xl ${m.sender === 'user' ? 'bg-brand-600 text-white rounded-br-none shadow-md' : 'bg-white text-slate-800 border border-slate-200/80 rounded-bl-none shadow-sm'}`}>
                                                {m.image && <img src={m.image} alt="Anexo" className="w-full h-32 object-cover rounded-lg mb-2 border border-white/20" />}
                                                <p className="leading-relaxed whitespace-pre-line">{m.text}</p>
                                            </div>
                                        </div>
                                    ))}
                                    {loading && <div className="text-brand-600 text-[11px] font-bold animate-pulse">⚡ Flux AI está analisando seus dados...</div>}
                                </div>

                                {selectedImage && (
                                    <div className="px-3 py-1.5 bg-brand-50 border-t border-brand-100 flex justify-between items-center text-[11px] text-brand-700 font-bold">
                                        <span>📷 Comprovante pronto para envio</span>
                                        <button onClick={() => setSelectedImage(null)} className="text-rose-500 hover:underline">Remover</button>
                                    </div>
                                )}

                                <form onSubmit={handleSend} className="p-3 bg-white border-t border-slate-100 flex items-center gap-2">
                                    <label className="cursor-pointer text-slate-400 hover:text-brand-600 p-2 rounded-xl hover:bg-slate-50 transition text-lg" title="Anexar comprovante">
                                        <input type="file" accept="image/*" className="hidden" onChange={handleImageSelect} />
                                        📎
                                    </label>
                                    <input 
                                        type="text" 
                                        placeholder="Converse ou mande um gasto..." 
                                        className="flex-1 bg-slate-100 border-none rounded-xl px-3 py-2.5 text-xs focus:outline-none focus:ring-2 focus:ring-brand-500/50 text-slate-800 font-medium"
                                        value={input}
                                        onChange={e => setInput(e.target.value)}
                                    />
                                    <button type="submit" disabled={loading} className="bg-brand-600 hover:bg-brand-700 text-white font-bold px-3 py-2 rounded-xl transition disabled:opacity-50 text-sm">
                                        &rarr;
                                    </button>
                                </form>
                            </div>
                        )}
                    </div>
                );
            };

            const MainApp = ({ user, data }) => {
                const [view, setView] = useState('dashboard');
                const [localData, setLocalData] = useState(data || DEFAULT_DATA);
                const [showModal, setShowModal] = useState(false);
                
                const [filterType, setFilterType] = useState('all');
                const [filterCat, setFilterCat] = useState('all');
                const [searchTerm, setSearchTerm] = useState('');

                const [desc, setDesc] = useState(''); const [amount, setAmount] = useState('');
                const [type, setType] = useState('expense'); const [cat, setCat] = useState('Casa');

                useEffect(() => { if (data) setLocalData(data); }, [data]);

                const saveToCloud = async (newData) => {
                    setLocalData(newData);
                    await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'data', 'finance'), newData, { merge: true });
                };

                const totalInc = (localData.transactions||[]).filter(t=>t.type==='income').reduce((a,b)=>a+b.amount,0);
                const totalExp = (localData.transactions||[]).filter(t=>t.type==='expense').reduce((a,b)=>a+b.amount,0);
                const balance = totalInc - totalExp;
                
                const currentMonthPrefix = new Date().toISOString().slice(0, 7);
                
                const monthlyExp = (localData.transactions||[])
                    .filter(t => t.type === 'expense' && t.date.slice(0, 7) === currentMonthPrefix)
                    .reduce((a,b) => a + b.amount, 0);

                const monthlyInc = (localData.transactions||[])
                    .filter(t => t.type === 'income' && t.date.slice(0, 7) === currentMonthPrefix)
                    .reduce((a,b) => a + b.amount, 0);

                const monthlyExpectedDebts = (localData.debts||[])
                    .filter(d => d.installmentsPaid < d.installmentsTotal)
                    .reduce((a, b) => a + (b.totalValue / b.installmentsTotal || 0), 0);
                
                const totalDebtValue = (localData.debts||[]).reduce((a,b)=>a + (b.totalValue || 0), 0);
                const totalDebtPaid = (localData.debts||[]).reduce((a,b)=>a + (b.installmentsPaid * (b.totalValue/b.installmentsTotal || 0)), 0);
                const totalDebtsRemaining = Math.max(0, totalDebtValue - totalDebtPaid);

                const totalExpectedIncome = (localData.incomeForecasts||[]).reduce((a,b)=>a+b.expectedAmount,0);
                const projectedBalance = balance + totalExpectedIncome;

                const daysLeft = useMemo(() => {
                    if (!localData.subscription?.expiresAt) return 0;
                    const diff = new Date(localData.subscription.expiresAt) - new Date();
                    return Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
                }, [localData.subscription]);

                const chartData = useMemo(() => {
                    const m = {};
                    (localData.transactions||[]).forEach(t => {
                        const k = t.date.slice(0,10);
                        if(!m[k]) m[k] = { name: new Date(t.date).toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'}), saldo: 0 };
                        if(t.type==='income') m[k].saldo += t.amount; else m[k].saldo -= t.amount;
                    });
                    return Object.keys(m).sort().slice(-7).map(k => m[k]);
                }, [localData.transactions]);

                const debtChartData = useMemo(() => {
                    return (localData.debts||[]).map(d => {
                        const valParcela = d.totalValue / d.installmentsTotal;
                        const pago = d.installmentsPaid * valParcela;
                        const rest = Math.max(0, d.totalValue - pago);
                        return { name: d.name, Quitado: pago, Restante: rest };
                    });
                }, [localData.debts]);

                const handleAddTransaction = async (e) => {
                    e.preventDefault();
                    if(!desc || !amount) return;
                    const newT = { id: Date.now(), desc, amount: parseFloat(amount), type, category: cat, date: new Date().toISOString() };
                    await saveToCloud({...localData, transactions: [newT, ...(localData.transactions||[])]});
                    setDesc(''); setAmount(''); setShowModal(false);
                };

                const handleConfirmForecastIncome = async (forecast) => {
                    const newT = { id: Date.now(), desc: `Recebimento: ${forecast.source}`, amount: forecast.expectedAmount, type: 'income', category: 'Salário', date: new Date().toISOString() };
                    await saveToCloud({...localData, transactions: [newT, ...(localData.transactions||[])]});
                    alert(`R$ ${forecast.expectedAmount.toFixed(2)} lançados como receita real no seu extrato!`);
                };

                const filteredTransactions = (localData.transactions||[]).filter(t => {
                    const matchesType = filterType === 'all' || t.type === filterType;
                    const matchesCat = filterCat === 'all' || t.category === filterCat;
                    const matchesSearch = t.desc.toLowerCase().includes(searchTerm.toLowerCase()) || t.category.toLowerCase().includes(searchTerm.toLowerCase());
                    return matchesType && matchesCat && matchesSearch;
                });

                return (
                    <div className="flex h-screen bg-slate-50 overflow-hidden">
                        {/* Sidebar Desktop */}
                        <aside className="w-64 bg-slate-900 text-slate-400 flex-col hidden md:flex border-r border-slate-800">
                            <div className="h-20 flex items-center px-6 gap-3"><Icons.Logo /><span className="text-white font-extrabold tracking-tight text-xl">Flux<span className="text-brand-500">Blue</span></span></div>
                            <div className="px-4 py-2"><div className="bg-slate-800/60 rounded-2xl p-3 border border-slate-700/50 flex items-center justify-between"><div className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div><span className="text-xs font-semibold text-slate-200">Plano Pro</span></div><span className="text-[11px] font-bold bg-slate-700 text-slate-300 px-2 py-0.5 rounded-md">{daysLeft}d</span></div></div>
                            <nav className="flex-1 px-4 py-4 space-y-1.5">
                                {[
                                    {id:'dashboard', label:'Visão Geral', icon:<Icons.Dashboard/>},
                                    {id:'debts', label:'Otimizador de Dívidas', icon:<Icons.Debts/>, badge:'Especial'},
                                    {id:'budgets', label:'Metas e Orçamentos', icon:<Icons.Budgets/>},
                                    {id:'transactions', label:'Lançamentos', icon:<Icons.Transactions/>},
                                    {id:'goals', label:'Metas', icon:<Icons.Goals/>},
                                    {id:'profile', label:'Perfil & Conta', icon:<Icons.Profile/>}
                                ].map(item => (
                                    <button key={item.id} onClick={()=>setView(item.id)} className={`w-full flex items-center justify-between px-4 py-3 text-sm font-semibold rounded-2xl transition ${view===item.id ? 'bg-brand-600 text-white shadow-lg shadow-brand-600/30' : 'hover:bg-slate-800/60 hover:text-slate-200'}`}>
                                        <div className="flex items-center gap-3">{item.icon}<span>{item.label}</span></div>
                                        {item.badge && <span className="text-[10px] uppercase tracking-wider font-extrabold bg-rose-500/20 text-rose-400 border border-rose-500/30 px-1.5 py-0.5 rounded-md">{item.badge}</span>}
                                    </button>
                                ))}
                            </nav>
                            <div className="p-4 border-t border-slate-800/80 flex items-center gap-3">
                                <div className="w-9 h-9 rounded-full bg-brand-500/20 border border-brand-500/30 flex items-center justify-center font-bold text-brand-400 uppercase">{user.email.slice(0,2)}</div>
                                <div className="flex-1 overflow-hidden"><p className="text-xs font-bold text-slate-200 truncate">{localData.settings?.userName || 'Usuário'}</p><p className="text-[11px] text-slate-500 truncate">{user.email}</p></div>
                            </div>
                        </aside>

                        {/* Área Principal */}
                        <main className="flex-1 flex flex-col h-full overflow-hidden relative">
                            {/* Header */}
                            <header className="h-20 bg-white/80 backdrop-blur-md border-b border-slate-100 flex items-center justify-between px-6 z-10 shrink-0">
                                <div className="flex items-center gap-3">
                                    <div className="md:hidden text-brand-600"><Icons.Logo className="w-8 h-8" /></div>
                                    <h2 className="text-lg font-extrabold text-slate-800 capitalize tracking-tight">
                                        {view === 'dashboard' && 'Visão Geral'}
                                        {view === 'debts' && 'Plano Sair das Dívidas 🚀'}
                                        {view === 'budgets' && 'Orçamentos & Previsões'}
                                        {view === 'transactions' && 'Extrato Completo'}
                                        {view === 'goals' && 'Metas Financeiras'}
                                        {view === 'profile' && 'Sua Conta'}
                                    </h2>
                                </div>
                                <button onClick={()=>setShowModal(true)} className="bg-slate-900 hover:bg-slate-800 text-white text-xs font-bold px-4 py-2.5 rounded-xl shadow-md flex items-center gap-2 transition active:scale-95">
                                    <Icons.Plus className="w-4 h-4 text-brand-400" /><span>Novo Lançamento</span>
                                </button>
                            </header>

                            {/* Conteúdo Rolável */}
                            <div className="flex-1 overflow-y-auto p-4 md:p-8 no-scrollbar pb-28 md:pb-8">
                                <div className="max-w-5xl mx-auto space-y-6">

                                    {/* 1. DASHBOARD */}
                                    {view === 'dashboard' && (
                                        <>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                                <div className="bg-white p-6 rounded-3xl card-shadow border border-slate-100 relative overflow-hidden">
                                                    <span className="text-xs font-extrabold text-slate-400 uppercase tracking-wider block mb-1">Saldo Total em Conta</span>
                                                    <p className={`text-2xl font-extrabold tracking-tight ${balance>=0?'text-slate-900':'text-rose-600'}`}>R$ {balance.toFixed(2)}</p>
                                                    <p className="text-[10px] text-slate-400 mt-1">Lançamentos reais acumulados</p>
                                                </div>

                                                <div className="bg-white p-6 rounded-3xl card-shadow border border-slate-100 relative overflow-hidden">
                                                    <span className="text-xs font-extrabold text-rose-500 uppercase tracking-wider block mb-1">Gasto no Mês Atual</span>
                                                    <p className="text-2xl font-black tracking-tight text-rose-600">R$ {monthlyExp.toFixed(2)}</p>
                                                    <p className="text-[10px] text-slate-400 mt-1">Saídas de {new Date().toLocaleDateString('pt-BR', {month: 'long'})}</p>
                                                </div>

                                                <div className="bg-white p-6 rounded-3xl card-shadow border border-slate-100 relative overflow-hidden">
                                                    <span className="text-xs font-extrabold text-amber-500 uppercase tracking-wider block mb-1">Dívidas Previstas no Mês</span>
                                                    <p className="text-2xl font-black tracking-tight text-amber-600">R$ {monthlyExpectedDebts.toFixed(2)}</p>
                                                    <p className="text-[10px] text-slate-400 mt-1">Soma das parcelas que vencem agora</p>
                                                </div>

                                                <div className="bg-gradient-to-br from-brand-600 to-indigo-700 p-6 rounded-3xl card-shadow text-white relative overflow-hidden">
                                                    <span className="text-xs font-bold text-brand-200 uppercase tracking-wider block mb-1">Receita Prevista</span>
                                                    <p className="text-2xl font-black tracking-tight">R$ {totalExpectedIncome.toFixed(2)}</p>
                                                    <p className="text-[10px] text-brand-100 mt-1">Salário/rendas a receber</p>
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                <div className="bg-slate-900 text-white p-6 rounded-3xl card-shadow flex justify-between items-center">
                                                    <div>
                                                        <span className="text-xs font-bold text-slate-400 uppercase">Saldo Projetado (Com Previsões)</span>
                                                        <p className="text-2xl font-black text-emerald-400 mt-1">R$ {projectedBalance.toFixed(2)}</p>
                                                    </div>
                                                    <div className="text-right">
                                                        <span className="text-[10px] bg-slate-800 text-slate-300 px-3 py-1 rounded-full border border-slate-700">Se receber tudo</span>
                                                    </div>
                                                </div>

                                                <div className="bg-white p-6 rounded-3xl card-shadow border border-slate-100 flex justify-between items-center">
                                                    <div>
                                                        <span className="text-xs font-bold text-slate-400 uppercase">Dívida Total Restante (Longo Prazo)</span>
                                                        <p className="text-2xl font-black text-rose-600 mt-1">R$ {totalDebtsRemaining.toFixed(2)}</p>
                                                    </div>
                                                    <button onClick={()=>setView('debts')} className="text-xs font-bold bg-rose-50 text-rose-600 px-4 py-2 rounded-xl hover:bg-rose-100 transition">Ver Financiamentos &rarr;</button>
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                                <div className="bg-white p-6 rounded-3xl card-shadow border border-slate-100 lg:col-span-2 flex flex-col justify-between">
                                                    <div>
                                                        <h3 className="font-extrabold text-slate-800 text-base mb-1">Evolução do Saldo</h3>
                                                        <p className="text-xs text-slate-400 mb-6">Seu histórico financeiro líquido</p>
                                                    </div>
                                                    <div className="h-64 w-full">
                                                        <ResponsiveContainer width="100%" height="100%">
                                                            <AreaChart data={chartData}>
                                                                <defs><linearGradient id="colorSaldo" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#6366f1" stopOpacity={0.3}/><stop offset="95%" stopColor="#6366f1" stopOpacity={0}/></linearGradient></defs>
                                                                <XAxis dataKey="name" stroke="#94a3b8" fontSize={12} tickLine={false} />
                                                                <Tooltip contentStyle={{backgroundColor: '#0f172a', borderRadius: '12px', border: 'none', color: '#fff', fontWeight: 'bold'}} />
                                                                <Area type="monotone" dataKey="saldo" stroke="#6366f1" strokeWidth={3} fillOpacity={1} fill="url(#colorSaldo)" />
                                                            </AreaChart>
                                                        </ResponsiveContainer>
                                                    </div>
                                                </div>

                                                <div className="bg-slate-900 text-white p-6 rounded-3xl card-shadow flex flex-col justify-between relative overflow-hidden">
                                                    <div className="absolute -right-10 -top-10 w-40 h-40 bg-brand-500/20 rounded-full blur-2xl"></div>
                                                    <div>
                                                        <span className="text-[10px] font-extrabold uppercase tracking-widest bg-brand-500/20 text-brand-300 px-2.5 py-1 rounded-lg border border-brand-500/30">Dica Financeira</span>
                                                        <h3 className="text-xl font-extrabold mt-4 leading-snug">Quer pagar bem menos no financiamento da moto?</h3>
                                                        <p className="text-slate-400 text-xs mt-2 leading-relaxed">Pagar as parcelas "de trás para frente" (amortizar) arranca os juros do banco. Nosso otimizador de dívidas faz esse cálculo para você economizar mil reais!</p>
                                                    </div>
                                                    <button onClick={()=>setView('debts')} className="w-full mt-6 bg-brand-600 hover:bg-brand-500 text-white font-bold py-3.5 rounded-2xl text-xs transition text-center block">
                                                        Acessar Amortizador 💰
                                                    </button>
                                                </div>
                                            </div>
                                        </>
                                    )}

                                    {/* 2. OTIMIZADOR DE DÍVIDAS COM GRÁFICO E AMORTIZAÇÃO */}
                                    {view === 'debts' && (
                                        <div className="space-y-6">
                                            <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                                <div className="bg-white p-5 rounded-3xl border border-slate-100 card-shadow">
                                                    <span className="text-xs font-extrabold text-slate-400 uppercase">Total Financiado</span>
                                                    <p className="text-2xl font-black text-slate-800 mt-1">R$ {totalDebtValue.toFixed(2)}</p>
                                                </div>
                                                <div className="bg-white p-5 rounded-3xl border border-slate-100 card-shadow">
                                                    <span className="text-xs font-extrabold text-slate-400 uppercase">Valor Quitado</span>
                                                    <p className="text-2xl font-black text-emerald-600 mt-1">R$ {totalDebtPaid.toFixed(2)}</p>
                                                </div>
                                                <div className="bg-white p-5 rounded-3xl border border-slate-100 card-shadow">
                                                    <span className="text-xs font-extrabold text-slate-400 uppercase">Saldo Restante</span>
                                                    <p className="text-2xl font-black text-rose-600 mt-1">R$ {totalDebtsRemaining.toFixed(2)}</p>
                                                </div>
                                                <div className="bg-amber-50 p-5 rounded-3xl border border-amber-200 card-shadow">
                                                    <span className="text-xs font-extrabold text-amber-700 uppercase">Previsto Este Mês</span>
                                                    <p className="text-2xl font-black text-amber-800 mt-1">R$ {monthlyExpectedDebts.toFixed(2)}</p>
                                                </div>
                                            </div>

                                            {debtChartData.length > 0 && (
                                                <div className="bg-white p-6 rounded-3xl card-shadow border border-slate-100">
                                                    <h3 className="font-extrabold text-slate-800 text-base mb-1">Gráfico de Quitação das Dívidas</h3>
                                                    <p className="text-xs text-slate-400 mb-6">Comparativo entre o valor já pago e o que falta quitar</p>
                                                    <div className="h-60 w-full">
                                                        <ResponsiveContainer width="100%" height="100%">
                                                            <BarChart data={debtChartData} layout="vertical">
                                                                <XAxis type="number" stroke="#94a3b8" fontSize={12} />
                                                                <YAxis type="category" dataKey="name" stroke="#94a3b8" fontSize={12} width={100} />
                                                                <Tooltip contentStyle={{backgroundColor: '#0f172a', borderRadius: '12px', border: 'none', color: '#fff', fontWeight: 'bold'}} />
                                                                <Legend />
                                                                <Bar dataKey="Quitado" fill="#10b981" radius={[0, 4, 4, 0]} stackId="a" />
                                                                <Bar dataKey="Restante" fill="#f43f5e" radius={[0, 4, 4, 0]} stackId="a" />
                                                            </BarChart>
                                                        </ResponsiveContainer>
                                                    </div>
                                                </div>
                                            )}

                                            <div className="bg-gradient-to-r from-slate-900 via-indigo-950 to-slate-900 text-white p-8 rounded-3xl card-shadow border border-slate-800">
                                                <span className="bg-rose-500 text-white text-[10px] font-extrabold uppercase px-2.5 py-1 rounded-md tracking-wider">Estratégia de Quitação</span>
                                                <h2 className="text-2xl sm:text-3xl font-black mt-3">Amortização de Parcelas</h2>
                                                <p className="text-slate-300 text-xs sm:text-sm mt-2 leading-relaxed">
                                                    <b>Como pagar menos na parcela "de trás"?</b> Ao antecipar parcelas do final do seu financiamento, o banco é obrigado por lei (Código de Defesa do Consumidor) a descontar 100% dos juros proporcionais ao tempo adiantado. Use o botão <b>Amortizar (Pagar de Trás)</b> abaixo, digite quanto o banco cobrou com desconto e veja seu saldo devedor despencar!
                                                </p>
                                            </div>

                                            <div className="flex justify-between items-center bg-white p-6 rounded-3xl card-shadow border border-slate-100">
                                                <div><h3 className="font-extrabold text-slate-800">Seus Financiamentos & Dívidas</h3><p className="text-xs text-slate-400">Organizados do menor para o maior (Bola de Neve)</p></div>
                                                <button onClick={()=>{
                                                    const n = prompt('Nome da Dívida (ex: Financiamento Moto):');
                                                    const v = parseFloat(prompt('Valor Total Financiado (R$):'));
                                                    const i = parseInt(prompt('Quantidade total de parcelas:'));
                                                    if(n && v && i) {
                                                        const newDebt = { id: Date.now(), name: n, totalValue: v, installmentsTotal: i, installmentsPaid: 0 };
                                                        saveToCloud({...localData, debts: [...(localData.debts||[]), newDebt]});
                                                    }
                                                }} className="bg-brand-600 hover:bg-brand-700 text-white text-xs font-bold px-4 py-2.5 rounded-xl shadow-md transition">+ Cadastrar Financiamento</button>
                                            </div>

                                            <div className="grid gap-4">
                                                {(localData.debts||[])
                                                    .sort((a,b) => (a.totalValue - a.installmentsPaid*(a.totalValue/a.installmentsTotal)) - (b.totalValue - b.installmentsPaid*(b.totalValue/b.installmentsTotal)))
                                                    .map((d, index) => {
                                                        const valParcela = d.totalValue / d.installmentsTotal;
                                                        const pendente = Math.max(0, d.totalValue - (d.installmentsPaid * valParcela));
                                                        const quitado = d.installmentsPaid >= d.installmentsTotal;
                                                        
                                                        return (
                                                            <div key={d.id} className={`p-6 rounded-3xl border transition flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 ${index === 0 && !quitado ? 'bg-indigo-50/50 border-indigo-200 ring-2 ring-indigo-500/20' : 'bg-white border-slate-100 card-shadow'}`}>
                                                                <div className="space-y-1">
                                                                    <div className="flex items-center gap-2">
                                                                        {index === 0 && !quitado && <span className="bg-indigo-600 text-white text-[10px] font-extrabold px-2 py-0.5 rounded-md uppercase">Foco Atual 🔥</span>}
                                                                        <h4 className={`font-extrabold text-base ${quitado ? 'line-through text-slate-400' : 'text-slate-900'}`}>{d.name}</h4>
                                                                    </div>
                                                                    <p className="text-xs text-slate-500">Parcelas liquidadas: <b className="text-slate-800">{d.installmentsPaid} de {d.installmentsTotal}</b> • Parcela Nominal: <b>R$ {valParcela.toFixed(2)}</b></p>
                                                                    <div className="w-48 h-2 bg-slate-200 rounded-full mt-2 overflow-hidden">
                                                                        <div className="h-full bg-brand-600 rounded-full transition-all" style={{width: `${(d.installmentsPaid/d.installmentsTotal)*100}%`}}></div>
                                                                    </div>
                                                                </div>
                                                                <div className="flex items-center justify-between w-full sm:w-auto gap-6 border-t sm:border-t-0 pt-4 sm:pt-0">
                                                                    <div className="text-right">
                                                                        <span className="text-[10px] font-bold text-slate-400 uppercase block">Saldo Devedor Restante</span>
                                                                        <span className="text-lg font-black text-rose-600">R$ {pendente.toFixed(2)}</span>
                                                                    </div>
                                                                    {!quitado ? (
                                                                        <div className="flex flex-col sm:flex-row gap-2">
                                                                            <button onClick={()=>{
                                                                                if(confirm(`Confirmar pagamento da parcela normal (R$ ${valParcela.toFixed(2)})?`)) {
                                                                                    const newTx = { id: Date.now(), desc: `Parcela ${d.name}`, amount: valParcela, type: 'expense', category: 'Dívidas', date: new Date().toISOString() };
                                                                                    const updated = (localData.debts||[]).map(x => x.id === d.id ? {...x, installmentsPaid: x.installmentsPaid + 1} : x);
                                                                                    saveToCloud({...localData, debts: updated, transactions: [newTx, ...(localData.transactions||[])]});
                                                                                }
                                                                            }} className="bg-slate-900 hover:bg-slate-800 text-white text-xs font-bold px-3 py-2 rounded-xl shadow-md transition">
                                                                                Pagar Normal
                                                                            </button>
                                                                            <button onClick={()=>{
                                                                                const realPaid = parseFloat(prompt(`A parcela normal do final do contrato é R$ ${valParcela.toFixed(2)}.\nQual o valor com desconto que você pagou para amortizar (quitar de trás para frente)?`));
                                                                                if(!isNaN(realPaid) && realPaid > 0) {
                                                                                    const newTx = { id: Date.now(), desc: `Amortização de Trás: ${d.name}`, amount: realPaid, type: 'expense', category: 'Dívidas', date: new Date().toISOString() };
                                                                                    const updated = (localData.debts||[]).map(x => x.id === d.id ? {...x, installmentsPaid: x.installmentsPaid + 1} : x);
                                                                                    saveToCloud({...localData, debts: updated, transactions: [newTx, ...(localData.transactions||[])]});
                                                                                    alert(`Excelente! Você deu baixa em 1 parcela do final e economizou R$ ${(valParcela - realPaid).toFixed(2)} em juros puros! 🎉`);
                                                                                }
                                                                            }} className="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold px-3 py-2 rounded-xl shadow-md transition">
                                                                                Amortizar (De Trás) 💰
                                                                            </button>
                                                                        </div>
                                                                    ) : (
                                                                        <span className="bg-emerald-100 text-emerald-700 font-extrabold text-xs px-3 py-1.5 rounded-xl">Financiamento Quitado! 🎉</span>
                                                                    )}
                                                                    <button onClick={()=>{if(confirm('Excluir esta dívida?')) saveToCloud({...localData, debts: localData.debts.filter(x=>x.id!==d.id)})}} className="text-slate-300 hover:text-rose-500 p-2"><Icons.Trash /></button>
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                {(localData.debts||[]).length === 0 && <div className="text-center py-12 bg-white rounded-3xl border border-slate-100 text-slate-400 text-xs">Nenhum financiamento ativo cadastrado.</div>}
                                            </div>
                                        </div>
                                    )}

                                    {/* 3. ORÇAMENTOS E PREVISÕES DE RECEITA */}
                                    {view === 'budgets' && (
                                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                            <div className="bg-white p-6 md:p-8 rounded-3xl card-shadow border border-slate-100 space-y-6">
                                                <div className="flex justify-between items-center">
                                                    <div><h3 className="font-extrabold text-slate-900 text-lg">Previsão de Receitas</h3><p className="text-xs text-slate-400">Salários e rendimentos esperados no mês</p></div>
                                                    <button onClick={()=>{
                                                        const s = prompt('Nome da Renda (ex: Meu Salário, Renda Extra):');
                                                        const v = parseFloat(prompt('Valor Esperado (R$):'));
                                                        if(s && !isNaN(v)) saveToCloud({...localData, incomeForecasts: [...(localData.incomeForecasts||[]), {id: Date.now(), source: s, expectedAmount: v}]});
                                                    }} className="bg-brand-500 hover:bg-brand-600 text-white text-xs font-bold px-3 py-2 rounded-xl shadow">+ Previsão</button>
                                                </div>
                                                <div className="space-y-3">
                                                    {(localData.incomeForecasts||[]).map((f) => (
                                                        <div key={f.id} className="p-4 rounded-2xl bg-brand-50/40 border border-brand-100/50 flex justify-between items-center">
                                                            <div>
                                                                <p className="font-extrabold text-sm text-slate-800">{f.source}</p>
                                                                <p className="text-xs text-brand-600 font-bold">R$ {f.expectedAmount.toFixed(2)}</p>
                                                            </div>
                                                            <div className="flex items-center gap-2">
                                                                <button onClick={()=>handleConfirmForecastIncome(f)} className="bg-brand-600 hover:bg-brand-700 text-white text-[11px] font-bold px-2.5 py-1.5 rounded-lg shadow-sm transition">Confirmar Recebimento</button>
                                                                <button onClick={()=>saveToCloud({...localData, incomeForecasts: localData.incomeForecasts.filter(x=>x.id!==f.id)})} className="text-slate-400 hover:text-rose-500 p-1"><Icons.Trash /></button>
                                                            </div>
                                                        </div>
                                                    ))}
                                                    {(localData.incomeForecasts||[]).length === 0 && <p className="text-center py-6 text-slate-400 text-xs">Nenhuma previsão de receita cadastrada.</p>}
                                                </div>
                                            </div>

                                            <div className="bg-white p-6 md:p-8 rounded-3xl card-shadow border border-slate-100 space-y-6">
                                                <div className="flex justify-between items-center">
                                                    <div><h3 className="font-extrabold text-slate-900 text-lg">Teto de Gastos (Tópicos)</h3><p className="text-xs text-slate-400">Limites de despesa por categoria</p></div>
                                                    <button onClick={()=>{
                                                        const c = prompt('Categoria (ex: Mercado, Lazer):');
                                                        const l = parseFloat(prompt('Limite (R$):'));
                                                        if(c && !isNaN(l)) saveToCloud({...localData, budgets: [...(localData.budgets||[]), {category: c, limit: l}]});
                                                    }} className="bg-brand-600 text-white text-xs font-bold px-3 py-2 rounded-xl shadow">+ Novo Teto</button>
                                                </div>
                                                <div className="space-y-4">
                                                    {(localData.budgets||[]).map((b, i) => {
                                                        const gasto = (localData.transactions||[]).filter(t => t.type === 'expense' && t.category === b.category).reduce((acc, curr) => acc + curr.amount, 0);
                                                        const perc = Math.min((gasto / b.limit) * 100, 100);
                                                        const estourou = gasto > b.limit;
                                                        return (
                                                            <div key={i} className="space-y-2">
                                                                <div className="flex justify-between items-center text-xs"><span className="font-bold text-slate-700">{b.category}</span><span className={`font-bold ${estourou ? 'text-rose-600':'text-slate-500'}`}>R$ {gasto.toFixed(2)} de {b.limit.toFixed(2)}</span></div>
                                                                <div className="w-full h-2 bg-slate-200 rounded-full overflow-hidden">
                                                                    <div className={`h-full rounded-full ${estourou ? 'bg-rose-500' : perc > 80 ? 'bg-amber-500' : 'bg-emerald-500'}`} style={{width: `${perc}%`}}></div>
                                                                </div>
                                                                <div className="flex justify-between text-[10px] text-slate-400">
                                                                    <span>{estourou ? '⚠️ Limite Ultrapassado' : `${(100-perc).toFixed(0)}% restante`}</span>
                                                                    <button onClick={()=>saveToCloud({...localData, budgets: localData.budgets.filter(x=>x.category!==b.category)})} className="hover:text-rose-600 font-bold">Remover</button>
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* 4. EXTRATO DE LANÇAMENTOS COM FILTROS */}
                                    {view === 'transactions' && (
                                        <div className="bg-white p-6 md:p-8 rounded-3xl card-shadow border border-slate-100 space-y-6">
                                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                                                <div><h3 className="font-extrabold text-slate-900 text-lg">Histórico de Lançamentos</h3><span className="text-xs font-bold text-slate-400">Exibindo: {filteredTransactions.length} transações</span></div>
                                                <div className="flex flex-wrap gap-2 w-full sm:w-auto">
                                                    <input 
                                                        type="text" 
                                                        placeholder="Buscar lançamento..." 
                                                        className="bg-slate-50 border border-slate-200 rounded-xl px-3 py-1.5 text-xs focus:outline-none focus:border-brand-600 flex-1 sm:w-40"
                                                        value={searchTerm}
                                                        onChange={e=>setSearchTerm(e.target.value)}
                                                    />
                                                    <select className="bg-slate-50 border border-slate-200 rounded-xl px-3 py-1.5 text-xs font-medium focus:outline-none" value={filterType} onChange={e=>setFilterType(e.target.value)}>
                                                        <option value="all">Todos os Tipos</option>
                                                        <option value="income">Receitas (+)</option>
                                                        <option value="expense">Despesas (-)</option>
                                                    </select>
                                                    <select className="bg-slate-50 border border-slate-200 rounded-xl px-3 py-1.5 text-xs font-medium focus:outline-none" value={filterCat} onChange={e=>setFilterCat(e.target.value)}>
                                                        <option value="all">Todas Categorias</option>
                                                        {(localData.customCategories||[]).map(c=><option key={c} value={c}>{c}</option>)}
                                                    </select>
                                                </div>
                                            </div>
                                            <div className="divide-y divide-slate-100">
                                                {filteredTransactions.map(t => (
                                                    <div key={t.id} className="py-4 flex items-center justify-between group">
                                                        <div className="flex items-center gap-3.5">
                                                            <div className={`w-10 h-10 rounded-2xl flex items-center justify-center font-bold text-xs ${t.type === 'income' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}`}>{t.type === 'income' ? '+' : '-'}</div>
                                                            <div><p className="font-bold text-sm text-slate-800">{t.desc}</p><p className="text-xs text-slate-400">{new Date(t.date).toLocaleDateString('pt-BR')} • {t.category}</p></div>
                                                        </div>
                                                        <div className="flex items-center gap-4">
                                                            <span className={`font-extrabold text-sm ${t.type === 'income' ? 'text-emerald-600' : 'text-slate-800'}`}>{t.type === 'expense' ? '- ' : '+ '}R$ {t.amount.toFixed(2)}</span>
                                                            <button onClick={()=>{if(confirm('Excluir transação?')) saveToCloud({...localData, transactions: localData.transactions.filter(x=>x.id!==t.id)})}} className="text-slate-300 hover:text-rose-500 p-1"><Icons.Trash /></button>
                                                        </div>
                                                    </div>
                                                ))}
                                                {filteredTransactions.length === 0 && <p className="text-center py-12 text-slate-400 text-xs">Nenhum lançamento encontrado para estes filtros.</p>}
                                            </div>
                                        </div>
                                    )}

                                    {/* 5. METAS */}
                                    {view === 'goals' && (
                                        <div className="bg-white p-6 md:p-8 rounded-3xl card-shadow border border-slate-100 space-y-6">
                                            <div className="flex justify-between items-center"><div><h3 className="font-extrabold text-slate-900 text-lg">Metas de Economia</h3><p className="text-xs text-slate-400">Guarde dinheiro para seus sonhos</p></div><button onClick={()=>{const t=prompt('Qual o objetivo (ex: Viagem)?'); const v=parseFloat(prompt('Valor alvo (R$):')); if(t&&v) saveToCloud({...localData, goals:[...(localData.goals||[]), {id:Date.now(), title:t, target:v, saved:0}]})}} className="bg-brand-600 text-white text-xs font-bold px-4 py-2.5 rounded-xl shadow-md">+ Criar Meta</button></div>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                {(localData.goals||[]).map(g => {
                                                    const perc = Math.min((g.saved / g.target) * 100, 100);
                                                    return (
                                                        <div key={g.id} className="p-6 rounded-2xl border border-slate-100 bg-slate-50/50 space-y-4">
                                                            <div className="flex justify-between items-start"><div><h4 className="font-extrabold text-slate-900">{g.title}</h4><p className="text-xs font-semibold text-brand-600 mt-0.5">R$ {g.saved.toFixed(2)} <span className="text-slate-400 font-normal">de R$ {g.target.toFixed(2)}</span></p></div><span className="text-xs font-black text-slate-700 bg-white px-2 py-1 rounded-lg border border-slate-200/60">{perc.toFixed(0)}%</span></div>
                                                            <div className="w-full h-2.5 bg-slate-200 rounded-full overflow-hidden"><div className="h-full bg-brand-600 rounded-full" style={{width: `${perc}%`}}></div></div>
                                                            <div className="flex justify-between items-center pt-2 border-t border-slate-200/50"><button onClick={()=>{const val=parseFloat(prompt('Valor para guardar agora (R$):')); if(!isNaN(val) && val>0) saveToCloud({...localData, goals: localData.goals.map(x=>x.id===g.id?{...x, saved:x.saved+val}:x)})}} className="bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold px-3 py-1.5 rounded-lg transition">+ Guardar Dinheiro</button><button onClick={()=>saveToCloud({...localData, goals: localData.goals.filter(x=>x.id!==g.id)})} className="text-slate-400 hover:text-rose-500"><Icons.Trash /></button></div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    )}

                                    {/* 6. PERFIL */}
                                    {view === 'profile' && (
                                        <div className="bg-white p-6 md:p-8 rounded-3xl card-shadow border border-slate-100 max-w-md mx-auto space-y-6 text-center">
                                            <div className="w-16 h-16 bg-brand-100 text-brand-600 rounded-full flex items-center justify-center text-xl font-black mx-auto uppercase">{user.email.slice(0,2)}</div>
                                            <div><h3 className="font-extrabold text-slate-900 text-lg">{localData.settings?.userName || 'Usuário FluxBlue'}</h3><p className="text-xs text-slate-400 mt-1">{user.email}</p></div>
                                            <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100 text-left space-y-2"><label className="block text-[11px] font-bold text-slate-400 uppercase">Alterar Nome de Exibição</label><input className="w-full bg-white border border-slate-200 rounded-xl p-2.5 text-xs font-semibold" value={localData.settings?.userName || ''} onChange={e=>saveToCloud({...localData, settings: {...localData.settings, userName: e.target.value}})} placeholder="Seu nome" /></div>
                                            <button onClick={()=>signOut(auth)} className="w-full bg-rose-50 text-rose-600 hover:bg-rose-100 font-bold py-3 rounded-xl text-xs transition">Sair da Conta</button>
                                        </div>
                                    )}

                                </div>
                            </div>

                            {/* ASSISTENTE IA NO CANTO DA TELA COM DADOS REAIS */}
                            <AIChatAssistant 
                                localData={localData} 
                                saveToCloud={saveToCloud} 
                                balance={balance}
                                monthlyExp={monthlyExp}
                                monthlyInc={monthlyInc}
                                totalDebtsRemaining={totalDebtsRemaining}
                            />

                            {/* Modal Novo Lançamento */}
