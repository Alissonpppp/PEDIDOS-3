                            {showModal && (
                                <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 animate-fade-in">
                                    <div className="bg-white w-full max-w-md rounded-t-3xl sm:rounded-3xl p-6 sm:p-8 card-shadow space-y-5">
                                        <div className="flex justify-between items-center"><h3 className="font-extrabold text-slate-900 text-lg">Registrar Lançamento</h3><button onClick={()=>setShowModal(false)} className="text-slate-400 hover:text-slate-600 font-bold">✕</button></div>
                                        <form onSubmit={handleAddTransaction} className="space-y-4">
                                            <div className="grid grid-cols-2 gap-2 p-1 bg-slate-100 rounded-2xl">
                                                <button type="button" onClick={()=>setType('expense')} className={`py-2 rounded-xl font-bold text-xs transition ${type==='expense' ? 'bg-white text-rose-600 shadow-sm' : 'text-slate-500'}`}>Despesa</button>
                                                <button type="button" onClick={()=>setType('income')} className={`py-2 rounded-xl font-bold text-xs transition ${type==='income' ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-500'}`}>Receita</button>
                                            </div>
                                            <div><label className="block text-[11px] font-extrabold text-slate-400 uppercase mb-1">Descrição</label><input required type="text" placeholder="Ex: Compras no Supermercado" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-xs font-medium outline-none focus:border-brand-600" value={desc} onChange={e=>setDesc(e.target.value)} /></div>
                                            <div className="grid grid-cols-2 gap-3">
                                                <div><label className="block text-[11px] font-extrabold text-slate-400 uppercase mb-1">Valor (R$)</label><input required type="number" step="0.01" placeholder="0,00" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-xs font-medium outline-none focus:border-brand-600" value={amount} onChange={e=>setAmount(e.target.value)} /></div>
                                                <div><label className="block text-[11px] font-extrabold text-slate-400 uppercase mb-1">Categoria</label><select className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-xs font-medium outline-none focus:border-brand-600" value={cat} onChange={e=>setCat(e.target.value)}>{(localData.customCategories||[]).map(c=><option key={c} value={c}>{c}</option>)}</select></div>
                                            </div>
                                            <button type="submit" className="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-brand-500/25 transition text-xs mt-2">Salvar no Extrato</button>
                                        </form>
                                    </div>
                                </div>
                            )}

                            {/* Navegação Mobile */}
                            <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-lg border-t border-slate-200/60 flex items-center justify-around h-20 px-2 z-40">
                                {[
                                    {id:'dashboard', label:'Início', icon:<Icons.Dashboard/>},
                                    {id:'debts', label:'Dívidas', icon:<Icons.Debts/>},
                                    {id:'budgets', label:'Metas', icon:<Icons.Budgets/>},
                                    {id:'transactions', label:'Extrato', icon:<Icons.Transactions/>},
                                    {id:'profile', label:'Perfil', icon:<Icons.Profile/>}
                                ].map(item => (
                                    <button key={item.id} onClick={()=>setView(item.id)} className={`flex-1 flex flex-col items-center justify-center gap-1 py-1 transition ${view===item.id ? 'text-brand-600 font-bold scale-105' : 'text-slate-400 font-medium'}`}>
                                        {item.icon}<span className="text-[10px] tracking-tight">{item.label}</span>
                                    </button>
                                ))}
                            </nav>
                        </main>
                    </div>
                );
            };

            const Root = () => {
                const [user, setUser] = useState(null); const [userData, setUserData] = useState(null); const [loading, setLoading] = useState(true);
                useEffect(() => {
                    return onAuthStateChanged(auth, async (u) => {
                        if (u) {
                            setUser(u);
                            onSnapshot(doc(db, 'artifacts', appId, 'users', u.uid, 'data', 'finance'), (s) => {
                                if (s.exists()) setUserData(s.data());
                                setLoading(false);
                            });
                        } else { setUser(null); setLoading(false); }
                    });
                }, []);
                
                if (loading) return <div className="h-screen flex items-center justify-center"><div className="loader"></div></div>;
                if (!user) return <AuthScreen />;
                
                const isExpired = userData?.subscription?.active === false || (userData?.subscription?.expiresAt && new Date() > new Date(userData.subscription.expiresAt));
                if (isExpired && user.email !== "salatielvitorino45@gmail.com") return <Paywall user={user} />;
                
                return <MainApp user={user} data={userData} />;
            };
            ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
        }
        if (window.FirebaseSDK) startApp(); else window.addEventListener('firebase-ready', startApp);
    </script>
</body>
</html>
