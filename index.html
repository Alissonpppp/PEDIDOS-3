<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FluxBlue - Sistema Financeiro</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js";

        window.FirebaseSDK = {
            initializeApp,
            auth: { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup },
            firestore: { getFirestore, doc, onSnapshot, setDoc, getDoc }
        };
        window.dispatchEvent(new Event('firebase-ready'));
    </script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { brand: { 50: '#eff6ff', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' }, whatsapp: { 500: '#25D366' } } } }
        }
    </script>
    <style>
        body { background-color: #f8fafc; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"><div class="h-screen flex items-center justify-center"><div class="loader"></div></div></div>

    <script type="text/babel">
        const Icons = {
            Logo: ({ className = "w-10 h-10" }) => (
                <svg viewBox="0 0 100 100" className={className} fill="none"><rect width="100" height="100" rx="24" className="fill-brand-600"/><path d="M25 65L40 45L55 60L75 30" stroke="white" strokeWidth="8" strokeLinecap="round" strokeLinejoin="round"/></svg>
            ),
            Dashboard: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>,
            Transactions: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4" /><path d="M3 5v14a2 2 0 0 0 2 2h16v-5" /><path d="M18 12a2 2 0 0 0 0 4h4v-4Z" /></svg>,
            Debts: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M16 2v4"/><path d="M8 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>,
            Goals: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
            Profile: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
            Trash: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
            Google: () => <svg viewBox="0 0 24 24" width="20" height="20"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/></svg>,
            Lock: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        };

        const DEFAULT_DATA = {
            transactions: [], goals: [], debts: [], customCategories: ['Casa', 'Mercado', 'Lazer', 'Saúde', 'Transporte', 'Salário'],
            settings: { userName: 'Usuário' },
            subscription: { active: true, expiresAt: new Date(Date.now() + 7*24*60*60*1000).toISOString() }
        };

        function startApp() {
            const { initializeApp } = window.FirebaseSDK;
            const { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } = window.FirebaseSDK.auth;
            const { getFirestore, doc, onSnapshot, setDoc, getDoc } = window.FirebaseSDK.firestore;

            // MESMA CONFIGURAÇÃO DE BANCO EM AMBOS OS ARQUIVOS
            const firebaseConfig = {
                apiKey: "AIzaSyB5I6RG-FicgOThwhl-1LLWySo3JRjK1YI",
                authDomain: "bompre-8a7c0.firebaseapp.com",
                projectId: "bompre-8a7c0",
                storageBucket: "bompre-8a7c0.firebasestorage.app",
                messagingSenderId: "390830730249",
                appId: "1:390830730249:web:106a313c6d2bae02ec5cd8"
            };

            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = 'fluxblue-prod-v6';

            const { useState, useEffect, useMemo } = React;
            const { BarChart, Bar, XAxis, Tooltip, ResponsiveContainer } = window.Recharts || {};

            const AuthScreen = () => {
                const [email, setEmail] = useState(''); const [password, setPassword] = useState('');
                const [error, setError] = useState(''); const [loading, setLoading] = useState(false);

                const createInitialUserData = async (uid, userEmail) => {
                    const docRef = doc(db, 'artifacts', appId, 'public_users', uid);
                    const docSnap = await getDoc(docRef);
                    if (!docSnap.exists()) {
                        const exp = new Date(); exp.setDate(exp.getDate() + 7);
                        await setDoc(docRef, { email: userEmail, active: true, archived: false, expiresAt: exp.toISOString() });
                        await setDoc(doc(db, 'artifacts', appId, 'users', uid, 'data', 'finance'), { ...DEFAULT_DATA, subscription: { active: true, expiresAt: exp.toISOString() } });
                    }
                };

                const handleSubmit = async (e) => {
                    e.preventDefault(); setError(''); setLoading(true);
                    try { 
                        try { await signInWithEmailAndPassword(auth, email, password); } 
                        catch (e) { 
                             if(e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential'){
                                 const uc = await createUserWithEmailAndPassword(auth, email, password);
                                 await createInitialUserData(uc.user.uid, uc.user.email);
                             } else throw e;
                        }
                    } catch (err) { setError("Erro ao entrar. Verifique os dados."); } finally { setLoading(false); }
                };

                const handleGoogleLogin = async () => {
                    setLoading(true);
                    try {
                        const res = await signInWithPopup(auth, new GoogleAuthProvider());
                        await createInitialUserData(res.user.uid, res.user.email);
                    } catch (err) { setError("Erro com Google: " + err.message); } finally { setLoading(false); }
                };

                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-100 p-4">
                        <div className="max-w-md w-full bg-white rounded-xl shadow-lg p-8">
                            <div className="text-center mb-6">
                                <div className="flex justify-center mb-2"><Icons.Logo className="w-16 h-16" /></div>
                                <h1 className="text-3xl font-bold">Flux<span className="text-brand-600">Blue</span></h1>
                                <p className="text-slate-500 text-sm">Acesso ao Sistema</p>
                            </div>
                            {error && <div className="mb-4 p-3 bg-red-50 text-red-600 text-sm rounded">{error}</div>}
                            <form onSubmit={handleSubmit} className="space-y-4">
                                <input required type="email" className="w-full border rounded-lg p-3 text-sm" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} />
                                <input required type="password" className="w-full border rounded-lg p-3 text-sm" placeholder="Senha" value={password} onChange={e=>setPassword(e.target.value)} />
                                <button disabled={loading} className="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3 rounded-lg shadow">Entrar com Email</button>
                            </form>
                            <button onClick={handleGoogleLogin} disabled={loading} className="w-full mt-4 border hover:bg-slate-50 text-slate-700 font-bold py-3 rounded-lg flex items-center justify-center gap-3">
                                <Icons.Google /> Continuar com Google
                            </button>
                        </div>
                    </div>
                );
            };

            const Paywall = ({ user }) => (
                <div className="min-h-screen flex items-center justify-center bg-slate-900 p-4 text-center">
                    <div className="max-w-md w-full bg-white rounded-2xl shadow-2xl p-8">
                        <div className="mx-auto bg-red-100 w-16 h-16 rounded-full flex items-center justify-center mb-6"><Icons.Lock className="text-red-600 w-8 h-8" /></div>
                        <h2 className="text-2xl font-bold text-slate-800 mb-2">Assinatura Expirada</h2>
                        <p className="text-slate-600 mb-6 text-sm">Renove seu plano para continuar usando o FluxBlue.</p>
                        <a href="https://pay.cakto.com.br/scbctc9_679715" target="_blank" className="block w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg mb-3">Renovar Agora</a>
                        <button onClick={()=>window.location.reload()} className="text-brand-600 text-xs font-bold hover:underline mb-4">Já paguei (Atualizar)</button>
                        <div className="border-t pt-4"><button onClick={() => signOut(auth)} className="text-xs text-slate-400">Sair ({user.email})</button></div>
                    </div>
                </div>
            );

            const MainApp = ({ user, data }) => {
                const [view, setView] = useState('dashboard');
                const [localData, setLocalData] = useState(data || DEFAULT_DATA);
                const [desc, setDesc] = useState(''); const [amount, setAmount] = useState('');
                const [type, setType] = useState('expense'); const [cat, setCat] = useState('Casa');

                useEffect(() => { if (data) setLocalData(data); }, [data]);

                const saveToCloud = async (newData) => {
                    await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'data', 'finance'), newData, { merge: true });
                };

                const totalInc = (localData.transactions||[]).filter(t=>t.type==='income').reduce((a,b)=>a+b.amount,0);
                const totalExp = (localData.transactions||[]).filter(t=>t.type==='expense').reduce((a,b)=>a+b.amount,0);
                const balance = totalInc - totalExp;

                const daysLeft = useMemo(() => {
                    if (!localData.subscription?.expiresAt) return 0;
                    const diff = new Date(localData.subscription.expiresAt) - new Date();
                    return Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
                }, [localData.subscription]);

                return (
                    <div className="flex h-screen bg-slate-50">
                        <aside className="w-64 bg-slate-900 text-slate-300 flex-col hidden md:flex">
                            <div className="h-16 flex items-center px-6 bg-slate-900 gap-2"><Icons.Logo className="w-8 h-8" /><span className="text-white font-bold text-lg">FluxBlue</span></div>
                            <nav className="flex-1 py-4 px-3 space-y-1">
                                <button onClick={()=>setView('dashboard')} className={`w-full flex items-center px-4 py-3 text-sm rounded-lg ${view==='dashboard'?'bg-brand-600 text-white':'hover:bg-slate-800'}`}><span className="mr-3"><Icons.Dashboard/></span>Dashboard</button>
                                <button onClick={()=>setView('transactions')} className={`w-full flex items-center px-4 py-3 text-sm rounded-lg ${view==='transactions'?'bg-brand-600 text-white':'hover:bg-slate-800'}`}><span className="mr-3"><Icons.Transactions/></span>Lançamentos</button>
                                <button onClick={()=>setView('goals')} className={`w-full flex items-center px-4 py-3 text-sm rounded-lg ${view==='goals'?'bg-brand-600 text-white':'hover:bg-slate-800'}`}><span className="mr-3"><Icons.Goals/></span>Metas</button>
                                <button onClick={()=>setView('profile')} className={`w-full flex items-center px-4 py-3 text-sm rounded-lg ${view==='profile'?'bg-brand-600 text-white':'hover:bg-slate-800'}`}><span className="mr-3"><Icons.Profile/></span>Perfil</button>
                            </nav>
                            <div className="p-4 border-t border-slate-800 text-xs text-slate-500 text-center">Plano Ativo • {daysLeft} dias restantes</div>
                        </aside>

                        <main className="flex-1 overflow-y-auto p-4 md:p-8">
                            {view === 'dashboard' && (
                                <div className="space-y-6 max-w-5xl mx-auto">
                                    <h2 className="text-2xl font-bold">Visão Geral</h2>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        <div className="bg-white p-5 rounded-xl border shadow-sm"><p className="text-xs font-bold text-slate-500">ENTRADAS</p><p className="text-2xl font-bold text-green-600">R$ {totalInc.toFixed(2)}</p></div>
                                        <div className="bg-white p-5 rounded-xl border shadow-sm"><p className="text-xs font-bold text-slate-500">SAÍDAS</p><p className="text-2xl font-bold text-red-600">R$ {totalExp.toFixed(2)}</p></div>
                                        <div className="bg-white p-5 rounded-xl border shadow-sm"><p className="text-xs font-bold text-slate-500">SALDO</p><p className="text-2xl font-bold text-brand-600">R$ {balance.toFixed(2)}</p></div>
                                    </div>
                                </div>
                            )}

                            {view === 'transactions' && (
                                <div className="bg-white p-6 rounded-xl border shadow-sm max-w-4xl mx-auto">
                                    <h3 className="font-bold mb-4">Nova Transação</h3>
                                    <div className="grid grid-cols-2 md:grid-cols-5 gap-2 mb-6">
                                        <input className="border p-2 rounded text-sm" placeholder="Descrição" value={desc} onChange={e=>setDesc(e.target.value)} />
                                        <input type="number" className="border p-2 rounded text-sm" placeholder="Valor" value={amount} onChange={e=>setAmount(e.target.value)} />
                                        <select className="border p-2 rounded text-sm" value={type} onChange={e=>setType(e.target.value)}><option value="expense">Despesa</option><option value="income">Receita</option></select>
                                        <select className="border p-2 rounded text-sm" value={cat} onChange={e=>setCat(e.target.value)}>{(localData.customCategories||[]).map(c=><option key={c} value={c}>{c}</option>)}</select>
                                        <button onClick={()=>{if(!desc||!amount)return; const newT={id:Date.now(), desc, amount:parseFloat(amount), type, category:cat, date:new Date().toISOString()}; saveToCloud({...localData, transactions:[...(localData.transactions||[]), newT]}); setDesc(''); setAmount('');}} className="bg-brand-600 text-white rounded font-bold text-sm">Salvar</button>
                                    </div>
                                    <div className="divide-y">
                                        {(localData.transactions||[]).slice().reverse().map(t=>(
                                            <div key={t.id} className="py-3 flex justify-between text-sm items-center">
                                                <div><p className="font-medium">{t.desc}</p><p className="text-xs text-slate-400">{new Date(t.date).toLocaleDateString()} • {t.category}</p></div>
                                                <div className="flex items-center gap-3"><span className={`font-bold ${t.type==='income'?'text-green-600':'text-red-600'}`}>R$ {t.amount.toFixed(2)}</span><button onClick={()=>saveToCloud({...localData, transactions: localData.transactions.filter(x => x.id !== t.id)})} className="text-slate-300 hover:text-red-500"><Icons.Trash /></button></div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {view === 'goals' && (
                                <div className="bg-white p-6 rounded-xl border shadow-sm max-w-4xl mx-auto">
                                    <h3 className="font-bold mb-4">Suas Metas</h3>
                                    <button onClick={()=>{const t=prompt('Título'); const v=prompt('Meta (R$)'); if(t&&v) saveToCloud({...localData, goals:[...(localData.goals||[]), {id:Date.now(), title:t, target:parseFloat(v), saved:0}]})}} className="bg-brand-600 text-white px-3 py-1.5 rounded text-sm mb-4 font-bold">+ Nova Meta</button>
                                    <div className="grid md:grid-cols-2 gap-4">
                                        {(localData.goals||[]).map(g=>(<div key={g.id} className="border p-4 rounded-xl"><div className="flex justify-between mb-2"><span className="font-bold">{g.title}</span><span className="text-xs">R$ {g.saved} / {g.target}</span></div><div className="h-2 bg-slate-100 rounded-full mb-2"><div style={{width: Math.min((g.saved/g.target)*100, 100)+'%'}} className="h-full bg-brand-500 rounded-full"></div></div><button onClick={()=>{const val = parseFloat(prompt('Valor a guardar')); if(!isNaN(val) && val > 0) { saveToCloud({...localData, goals: localData.goals.map(x=>x.id===g.id?{...x, saved:x.saved+val}:x)}) }}} className="text-xs bg-green-50 text-green-700 px-2 py-1 rounded font-bold">Depositar</button></div>))}
                                    </div>
                                </div>
                            )}

                            {view === 'profile' && (
                                <div className="bg-white p-6 rounded-xl border shadow-sm max-w-md mx-auto">
                                    <h3 className="font-bold mb-4">Perfil</h3>
                                    <p className="text-sm text-slate-600 mb-2">E-mail: {user.email}</p>
                                    <p className="text-xs text-slate-400 mb-6">ID: {user.uid}</p>
                                    <button onClick={() => signOut(auth)} className="text-red-500 border border-red-200 px-4 py-2 rounded hover:bg-red-50 w-full text-sm font-bold">Sair da Conta</button>
                                </div>
                            )}
                        </main>

                        <nav className="md:hidden fixed bottom-0 w-full bg-white border-t flex justify-around p-2">
                            <button onClick={()=>setView('dashboard')} className={`p-2 ${view==='dashboard'?'text-brand-600':'text-slate-400'}`}><Icons.Dashboard /></button>
                            <button onClick={()=>setView('transactions')} className={`p-2 ${view==='transactions'?'text-brand-600':'text-slate-400'}`}><Icons.Transactions /></button>
                            <button onClick={()=>setView('goals')} className={`p-2 ${view==='goals'?'text-brand-600':'text-slate-400'}`}><Icons.Goals /></button>
                            <button onClick={()=>setView('profile')} className={`p-2 ${view==='profile'?'text-brand-600':'text-slate-400'}`}><Icons.Profile /></button>
                        </nav>
                    </div>
                );
            };

            const Root = () => {
                const [user, setUser] = useState(null); const [userData, setUserData] = useState(null); const [loading, setLoading] = useState(true);
                useEffect(() => {
                    return onAuthStateChanged(auth, async (u) => {
                        if (u) {
                            setUser(u);
                            onSnapshot(doc(db, 'artifacts', appId, 'users', u.uid, 'data', 'finance'), (s) => {
                                if (s.exists()) setUserData(s.data());
                                setLoading(false);
                            });
                        } else { setUser(null); setLoading(false); }
                    });
                }, []);
                
                if (loading) return <div className="h-screen flex items-center justify-center"><div className="loader"></div></div>;
                if (!user) return <AuthScreen />;
                
                const isExpired = userData?.subscription?.active === false || (userData?.subscription?.expiresAt && new Date() > new Date(userData.subscription.expiresAt));
                if (isExpired) return <Paywall user={user} />;
                
                return <MainApp user={user} data={userData} />;
            };
            ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
        }
        if (window.FirebaseSDK) startApp(); else window.addEventListener('firebase-ready', startApp);
    </script>
</body>
</html>
